services:
  olt-manager:
    image: ghcr.io/torugu1n/olt-manager:latest
    container_name: olt-manager
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/olt_manager.db
      PORT: 8000
      SECRET_KEY: troque-esta-chave
      OLT_HOST: 192.168.1.1
      OLT_PORT: 22
      OLT_USERNAME: admin
      OLT_PASSWORD: senha_da_olt
      OLT_ENABLE_PASSWORD: ""
      OLT_NAME: MA5800-X2
      OLT_TIMEOUT: 30
      OLT_SESSION_BOOTSTRAP_COMMANDS: undo idle-timeout
    ports:
      - "8000:8000"
    volumes:
      - olt_manager_data:/data
      - olt_manager_logs:/app/backend/logs

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300        # verifica a cada 5 minutos
      WATCHTOWER_CLEANUP: "true"           # remove imagens antigas
      WATCHTOWER_INCLUDE_STOPPED: "false"

volumes:
  olt_manager_data:
  olt_manager_logs:
